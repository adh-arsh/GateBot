; GateBot — Phase 2: SoftAP + local web control
; Board: ESP32 DevKit | Servo: Tower Pro SG90 on GPIO18
; AP: GateBot / Star@918 → http://192.168.4.1

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
  madhephaestus/ESP32Servo @ ^3.0.5
  bblanchon/ArduinoJson @ ^7.3.0

build_flags =
  -DCORE_DEBUG_LEVEL=1
